<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Resultado</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            text-align: center;
            padding-top: 80px;
            color: #ffffff;
        }
        .resultado {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.4);
            color: #2c3e50;
        }
        h2 {
            color: #27ae60;
        }
        .detalhes {
            font-size: 18px;
            margin: 15px 0;
        }
        a {
            text-decoration: none;
            background: #e67e22;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            transition: background 0.3s;
        }
        a:hover {
            background: #d35400;
        }
    </style>
</head>
<body>
    <div class="resultado">
        <h2>Quiz Concluído!</h2>
        <p class="detalhes">Acertos: {{ acertos }}/{{ total }} ({{ percentual|round(1) }}%)</p>
        <p class="detalhes">Erros: {{ erros }}</p>
        <a href="{{ url_for('index') }}">Fazer Novamente</a>
    </div>
</body>
</html>
