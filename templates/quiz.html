<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Pergunta {{ indice }}</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            padding: 30px;
            color: #ffffff;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(231, 76, 60, 0.2);
            color: #2c3e50;
        }
        h2 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin: 10px 0;
            font-size: 16px;
            cursor: pointer;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        label:hover {
            background: #e9ecef;
        }
        input[type=radio] {
            margin-right: 10px;
        }
        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background: #d35400;
        }
        .placar {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="placar">Acertos: {{ acertos }} | Erros: {{ erros }} | Progresso: {{ indice }}/{{ total }}</p>
        <h2>{{ pergunta.texto }}</h2>
        <form method="POST">
            {% for opcao in pergunta.opcoes %}
            <label>
                <input type="radio" name="escolha" value="{{ loop.index }}" required>
                {{ loop.index }}) {{ opcao }}
            </label>
            {% endfor %}
            <button type="submit">Confirmar</button>
        </form>
    </div>
</body>
</html>
