<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Escolha</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;  /* fundo escuro */
            color: #ffffff;
            text-align: center;
            padding-top: 60px;
        }
        .container {
            max-width: 650px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(52, 152, 219, 0.3);
            color: #2c3e50;
        }
        h2 {
            color: #3498db;
        }
        .secao {
            margin: 30px 0;
        }
        .secao h3 {
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        form {
            display: inline-block;
        }
        input[type=file] {
            margin: 10px 0;
            background: #ecf0f1;
            border: none;
            padding: 8px;
            border-radius: 4px;
        }
        button, .btn-padrao {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover, .btn-padrao:hover {
            background: #d35400;
        }
        .botoes-padrao {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .btn-padrao {
            background: #3498db;
        }
        .btn-padrao:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📂 Quiz Interdisciplinar</h2>

        <div class="secao">
            <h3>Carregar arquivo de perguntas</h3>
            <form method="POST" enctype="multipart/form-data">
                <input type="file" name="arquivo" accept=".txt,.csv" required>
                <br>
                <button type="submit">Iniciar Quiz</button>
            </form>
        </div>

        <div class="secao">
            <h3>Ou escolha um quiz pronto</h3>
            <div class="botoes-padrao">
                {% for materia, arquivo in quizzes.items() %}
                <a href="{{ url_for('quiz_padrao', materia=materia) }}" class="btn-padrao">{{ materia.capitalize() }}</a>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
